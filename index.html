<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mushroom Farm – 3D Blueprint</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1628;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;color:#c8d6e5}
canvas{display:block}
#info{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:10;text-align:center;pointer-events:none}
#info h1{font-size:20px;color:#00d2ff;letter-spacing:3px;text-transform:uppercase;margin-bottom:2px}
#info p{font-size:11px;color:#5a7d9a}
#legend{position:fixed;bottom:16px;left:16px;z-index:10;background:rgba(10,22,40,0.85);border:1px solid #1a3a5c;border-radius:6px;padding:10px 14px;font-size:11px;line-height:1.8}
#legend h4{color:#00d2ff;margin-bottom:4px;font-size:12px}
#legend span{display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:6px;vertical-align:middle}
#controls{position:fixed;bottom:16px;right:16px;z-index:10;background:rgba(10,22,40,0.85);border:1px solid #1a3a5c;border-radius:6px;padding:10px 14px;font-size:11px;line-height:2}
#controls button{background:#1a3a5c;color:#00d2ff;border:1px solid #2a5a8c;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:11px;margin:0 2px}
#controls button:hover{background:#2a5a8c}
.tooltip{position:fixed;padding:6px 10px;background:rgba(10,22,40,0.95);border:1px solid #00d2ff;border-radius:4px;font-size:11px;color:#c8d6e5;pointer-events:none;z-index:100;display:none;max-width:200px}
</style>
</head>
<body>
<div id="info">
  <h1>🍄 Mushroom Farm Blueprint</h1>
  <p>3D Layout – All dimensions in metres</p>
</div>
<div id="legend">
  <h4>Legend</h4>
  <div><span style="background:rgba(0,210,255,0.15);border:1px solid #00d2ff"></span>Room boundary (wireframe)</div>
  <div><span style="background:#4caf50"></span>Compost Hall</div>
  <div><span style="background:#ffeb3b"></span>Lab</div>
  <div><span style="background:#42a5f5"></span>Incubation</div>
  <div><span style="background:#e53935"></span>Fruiting Room</div>
  <div><span style="background:#bcaaa4"></span>Tray</div>
  <div><span style="background:#8d6e63"></span>Shelf / Equipment</div>
  <div><span style="background:#bbdefb;opacity:0.4"></span>Door / Window</div>
</div>
<div id="controls">
  <button id="btnTop">Top View</button>
  <button id="btnIso">Isometric</button>
  <button id="btnWalk">Walk View</button>
  <button id="btnReset">Reset</button>
</div>
<div class="tooltip" id="tooltip"></div>

<script type="importmap">
{
  "imports":{
    "three":"https://unpkg.com/three@0.157.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.157.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {CSS2DRenderer,CSS2DObject} from 'three/addons/renderers/CSS2DRenderer.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a1628);
scene.fog = new THREE.FogExp2(0x0a1628, 0.018);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position='absolute';
labelRenderer.domElement.style.top='0';
document.body.appendChild(labelRenderer.domElement);

// Lighting
const ambLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambLight);
const dirLight = new THREE.DirectionalLight(0xe8eaf6, 1.4);
dirLight.position.set(15,25,15);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(4096,4096);
dirLight.shadow.camera.left=-30; dirLight.shadow.camera.right=30;
dirLight.shadow.camera.top=30; dirLight.shadow.camera.bottom=-30;
scene.add(dirLight);
const hemiLight = new THREE.HemisphereLight(0x4488cc, 0x112244, 0.6);
scene.add(hemiLight);

// Cameras
const aspect = window.innerWidth/window.innerHeight;
const perspCam = new THREE.PerspectiveCamera(45, aspect, 0.1, 500);
perspCam.position.set(14,14,14);
const orthoCam = new THREE.OrthographicCamera(-20,20,20,-20,0.1,500);
orthoCam.position.set(0,30,0);
orthoCam.lookAt(0,0,0);
const isoCam = new THREE.PerspectiveCamera(35, aspect, 0.1, 500);
isoCam.position.set(18,14,18);
let activeCam = orthoCam;

const controls = new OrbitControls(activeCam, renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.08;
controls.target.set(0,0,0);
controls.mouseButtons={LEFT:THREE.Orbit.ROTATE,MIDDLE:THREE.Orbit.DOLLY,RIGHT:THREE.Orbit.PAN};

// Grid
const gridMain = new THREE.GridHelper(50,50,0x1a3a5c,0x0d1f33);
scene.add(gridMain);
const gridSub = new THREE.GridHelper(50,100,0x0f2240,0x0a1628);
scene.add(gridSub);

// Ground
const groundGeo = new THREE.PlaneGeometry(100,100);
const groundMat = new THREE.MeshBasicMaterial({visible:false});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x=-Math.PI/2;
ground.name='ground';
scene.add(ground);

// Blueprint-style material factory
function bpMat(color, opacity=0.25){
  return new THREE.MeshPhongMaterial({color, transparent:true, opacity, side:THREE.DoubleSide, depthWrite:false});
}
function bpWire(color='#00d2ff', opacity=0.8){
  return new THREE.MeshBasicMaterial({color, wireframe:true, transparent:true, opacity});
}

// CSS Label
function makeLabel(text, size=0.4){
  const div=document.createElement('div');
  div.textContent=text;
  div.style.cssText=`background:none;color:#00d2ff;font-size:11px;font-weight:600;font-family:consolas,'Courier New',monospace;white-space:nowrap;padding:1px 4px;border:1px solid rgba(0,210,255,0.3);border-radius:2px`;
  const obj=new CSS2DObject(div);
  obj.scale.setScalar(1/size*0.4);
  return obj;
}

// Dimension line helper
function addDimensionLine(start, end, labelText, color=0x00d2ff, yOffset=0.02){
  const points=[start.clone(), end.clone()];
  const geom=new THREE.BufferGeometry().setFromPoints(points);
  const mat=new THREE.LineBasicMaterial({color, transparent:true, opacity:0.7});
  const line=new THREE.Line(geom,mat);
  line.position.y=yOffset;
  scene.add(line);
  // end caps
  [start,end].forEach(p=>{
    const cap=new THREE.Mesh(new THREE.SphereGeometry(0.03,8,8), new THREE.MeshBasicMaterial({color}));
    cap.position.copy(p); cap.position.y=yOffset; scene.add(cap);
  });
  // label
  const mid=new THREE.Vector3().addVectors(start,end).multiplyScalar(0.5);
  const lbl=makeLabel(labelText,0.3);
  lbl.position.set(mid.x, yOffset+0.05, mid.z);
  scene.add(lbl);
}

// Room structure definitions
const rooms=[
  {type:'compost',  id:'Compost Hall',     w:5,d:5,h:3, color:0x4caf50, pos:{x:0,y:0,z:0}},
  {type:'lab',      id:'Lab',              w:4,d:4,h:3, color:0xffeb3b, pos:{x:6,y:0,z:0}},
  {type:'incubation',id:'Incubation',      w:3,d:3,h:2.5,color:0x42a5f5,pos:{x:0,y:0,z:6}},
  {type:'fruiting', id:'Fruiting Room A',  w:3,d:4,h:2.5,color:0xe53935,pos:{x:6,y:0,z:6}},
  {type:'fruiting', id:'Fruiting Room B',  w:3,d:4,h:2.5,color:0xe53935,pos:{x:10,y:0,z:6}},
];

const roomMeshes=[];

rooms.forEach(rm=>{
  const {w,d,h,color,pos,id}=rm;
  const cx=pos.x+w/2, cz=pos.z+d/2;

  // Solid fill (blueprint tinted)
  const solid=new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    bpMat(color,0.12)
  );
  solid.position.set(cx, h/2, cz);
  solid.castShadow=true; solid.receiveShadow=true;
  scene.add(solid);

  // Wireframe outline
  const wire=new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    bpWire(color,0.7)
  );
  wire.position.set(cx, h/2, cz);
  scene.add(wire);

  // Floor footprint
  const floor=new THREE.Mesh(
    new THREE.PlaneGeometry(w,d),
    new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.06, side:THREE.DoubleSide})
  );
  floor.rotation.x=-Math.PI/2;
  floor.position.set(cx,0.005,cz);
  scene.add(floor);

  // Corner markers
  [[0,0],[w,0],[w,d],[0,d]].forEach(([ox,oz])=>{
    const cor=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.08),new THREE.MeshBasicMaterial({color}));
    cor.position.set(pos.x+ox, 0.04, pos.z+oz);
    scene.add(cor);
  });

  // --- 5 Trays inside each room ---
  const trayW=(w*0.78)/5;
  const trayD=d*0.78;
  const trayH=h*0.18;
  const tStartX=pos.x+(w-trayW*5-0.05*4)/2;
  const tStartZ=pos.z+(d-trayD)/2;

  for(let i=0;i<5;i++){
    const tx=tStartX+i*(trayW+0.05);
    const tz=tStartZ;

    // Tray base
    const tBase=new THREE.Mesh(
      new THREE.BoxGeometry(trayW, trayH, trayD),
      bpMat(0xbcaaa4, 0.35)
    );
    tBase.position.set(tx+trayW/2, trayH/2, tz+trayD/2);
    tBase.castShadow=true; tBase.receiveShadow=true;
    scene.add(tBase);

    // Tray wire
    const tWire=new THREE.Mesh(
      new THREE.BoxGeometry(trayW, trayH, trayD),
      bpWire(0x808080, 0.45)
    );
    tWire.position.copy(tBase.position);
    scene.add(tWire);

    // 3-section dividers (vertical dividers)
    const divMat=new THREE.MeshBasicMaterial({color:0x8d6e63, transparent:true, opacity:0.5});
    const divW=0.04;
    for(let s=1;s<=2;s++){
      const div=new THREE.Mesh(
        new THREE.BoxGeometry(divW, trayH*0.9, trayD*0.9),
        divMat
      );
      div.position.set(
        tx + (trayW/3)*s,
        trayH/2+0.01,
        tz+trayD/2
      );
      scene.add(div);
    }

    // Small mushroom icons on each section
    for(let s=0;s<3;s++){
      const sx=tx + trayW/6 + s*(trayW/3);
      const sz=tz+trayD/2;
      const icon=makeLabel('🍄', 0.25);
      icon.position.set(sx, trayH+0.03, sz);
      scene.add(icon);
    }

    // Tray label
    const tLabel=makeLabel(`T${i+1}`,0.22);
    tLabel.position.set(tx+trayW/2, trayH+0.08, tz+trayD/2+0.15);
    scene.add(tLabel);
  }

  // --- Equipment placement ---
  // Shelf (back wall)
  const shelfW=w*0.8, shelfD=0.4, shelfH=h*0.85;
  const shelfZ=pos.z+d*0.1;
  const shelf=new THREE.Mesh(
    new THREE.BoxGeometry(shelfW, shelfH, shelfD),
    bpMat(0x6d4c41,0.3)
  );
  shelf.position.set(cx, shelfH/2, shelfZ);
  shelf.castShadow=true;
  scene.add(shelf);
  const shelfWire=new THREE.Mesh(new THREE.BoxGeometry(shelfW,shelfH,shelfD),bpWire(0x8d6e63,0.4));
  shelfWire.position.copy(shelf.position);
  scene.add(shelfWire);
  const shelfLabel=makeLabel('📚 Shelf',0.28);
  shelfLabel.position.set(cx, shelfH+0.1, shelfZ);
  scene.add(shelfLabel);

  // Table (center-left)
  const tableW=1.2, tableD=0.8, tableH=0.75;
  const tableX=pos.x+1.2, tableZ=cz;
  const tableLegGeo=new THREE.BoxGeometry(0.08,tableH-0.05,0.08);
  const tableLegMat=new THREE.MeshPhongMaterial({color:0x5d4037});
  [[-1,-1],[-1,1],[1,-1],[1,1]].forEach(([sx,sz])=>{
    const leg=new THREE.Mesh(tableLegGeo,tableLegMat);
    leg.position.set(tableX+sx*(tableW/2-0.1), (tableH-0.05)/2, tableZ+sz*(tableD/2-0.1));
    leg.castShadow=true; scene.add(leg);
  });
  const tableTop=new THREE.Mesh(
    new THREE.BoxGeometry(tableW,0.08,tableD),
    new THREE.MeshPhongMaterial({color:0x8d6e63})
  );
  tableTop.position.set(tableX, tableH, tableZ);
  tableTop.castShadow=true; scene.add(tableTop);
  const tableLabel=makeLabel('🔬 Table',0.25);
  tableLabel.position.set(tableX, tableH+0.15, tableZ);
  scene.add(tableLabel);

  // Humidifier (front-right corner)
  const humX=pos.x+w-0.8, humZ=pos.z+d-0.8;
  const humidifier=new THREE.Mesh(
    new THREE.CylinderGeometry(0.2,0.2,0.5,16),
    bpMat(0x29b6f6,0.4)
  );
  humidifier.position.set(humX, 0.25, humZ);
  scene.add(humidifier);
  const humLabel=makeLabel('💧',0.22);
  humLabel.position.set(humX, 0.6, humZ);
  scene.add(humLabel);

  // Fan (ceiling)
  const fanX=cx, fanZ=cz;
  const fan=new THREE.Mesh(
    new THREE.CircleGeometry(0.5,16),
    bpMat(0x90a4ae,0.35)
  );
  fan.rotation.x=-Math.PI/2;
  fan.position.set(fanX, h-0.15, fanZ);
  scene.add(fan);
  const fanLabel=makeLabel('🌀',0.22);
  fanLabel.position.set(fanX, h+0.1, fanZ);
  scene.add(fanLabel);

  // Door (front wall, left side)
  const doorW=1.0, doorH=2.0, doorD=0.08;
  const doorX=pos.x+0.1+doorW/2, doorZ=pos.z;
  const door=new THREE.Mesh(
    new THREE.BoxGeometry(doorW, doorH, doorD),
    bpMat(0xbcaaa4,0.3)
  );
  door.position.set(doorX, doorH/2, doorZ);
  scene.add(door);
  const doorWire=new THREE.Mesh(new THREE.BoxGeometry(doorW,doorH,doorD),bpWire(0xbbdefb,0.6));
  doorWire.position.copy(door.position);
  scene.add(doorWire);
  const doorLabel=makeLabel('🚪',0.25);
  doorLabel.position.set(doorX, doorH+0.1, doorZ-0.3);
  scene.add(doorLabel);

  // Window (back wall)
  const winW=1.4, winH=1.2, winD=0.08;
  const winX=cx, winZ=pos.z+d;
  const windowMesh=new THREE.Mesh(
    new THREE.BoxGeometry(winW, winH, winD),
    new THREE.MeshPhongMaterial({color:0xbbdefb, transparent:true, opacity:0.25, side:THREE.DoubleSide})
  );
  windowMesh.position.set(winX, winH/2+0.3, winZ);
  scene.add(windowMesh);
  const winWire=new THREE.Mesh(new THREE.BoxGeometry(winW,winH,winD),bpWire(0x81d4fa,0.4));
  winWire.position.copy(windowMesh.position);
  scene.add(winWire);

  // Lighting fixture (ceiling)
  const lightY=h-0.05;
  const lightFixture=new THREE.PointLight(0xffeedd,0.8,8);
  lightFixture.position.set(cx, lightY, cz);
  scene.add(lightFixture);
  const lightHelper=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8),new THREE.MeshBasicMaterial({color:0xffffaa}));
  lightHelper.position.set(cx, lightY, cz);
  scene.add(lightHelper);

  // --- Dimension annotations ---
  // Width dimension (along X)
  addDimensionLine(
    new THREE.Vector3(pos.x, h+0.5, pos.z+d+0.3),
    new THREE.Vector3(pos.x+w, h+0.5, pos.z+d+0.3),
    `${w}m`, color
  );
  // Depth dimension (along Z)
  addDimensionLine(
    new THREE.Vector3(pos.x-0.3, h+0.5, pos.z),
    new THREE.Vector3(pos.x-0.3, h+0.5, pos.z+d),
    `${d}m`, color
  );
  // Height annotation
  const hLabel=makeLabel(`${h}m`,0.22);
  hLabel.position.set(pos.x+w+0.3, h/2, pos.z);
  scene.add(hLabel);

  // Room name label
  const nameLabel=makeLabel(id, 0.45);
  nameLabel.position.set(cx, h+0.7, cz);
  scene.add(nameLabel);

  roomMeshes.push({solid,wire,floor,room:rm});
});

// Corridor / walkway lines (dashed)
function addCorridor(){
  const corridorY=0.03;
  // Main corridor between rooms (along Z at x=3.5)
  const corridorGeom=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(5.5,corridorY,0),
    new THREE.Vector3(5.5,corridorY,10)
  ]);
  const corridorMat=new THREE.LineDashedMaterial({color:0x4466aa, dashSize:0.4, gapSize:0.2, transparent:true, opacity:0.5});
  const corridor=new THREE.Line(corridorGeom,corridorMat);
  corridor.computeLineDistances();
  scene.add(corridor);

  // Horizontal corridor (along X at z=3)
  const hCorrGeom=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,corridorY,3),
    new THREE.Vector3(5,corridorY,3)
  ]);
  const hCorridor=new THREE.Line(hCorrGeom,corridorMat.clone());
  hCorridor.computeLineDistances();
  scene.add(hCorridor);

  // Horizontal corridor (along X at z=8)
  const hCorrGeom2=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,corridorY,8),
    new THREE.Vector3(5,corridorY,8)
  ]);
  const hCorridor2=new THREE.Line(hCorrGeom2,corridorMat.clone());
  hCorridor2.computeLineDistances();
  scene.add(hCorridor2);
}
addCorridor();

// Scale bar
(function(){
  const sStart=new THREE.Vector3(-4,0.02,9);
  const sEnd=new THREE.Vector3(-1,0.02,9);
  const geom=new THREE.BufferGeometry().setFromPoints([sStart,sEnd]);
  const mat=new THREE.LineBasicMaterial({color:0x00d2ff});
  scene.add(new THREE.Line(geom,mat));
  // end caps
  [sStart,sEnd].forEach(p=>{
    const c=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.06),new THREE.MeshBasicMaterial({color:0x00d2ff}));
    c.position.copy(p); scene.add(c);
  });
  const barLabel=makeLabel('3m',0.35);
  barLabel.position.set(-2.5,0.06,9.2);
  scene.add(barLabel);
})();

// Compass indicator
(function(){
  const compassGroup=new THREE.Group();
  compassGroup.position.set(12,0.1,12);
  // N arrow
  const nGeom=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1.5)
  ]);
  const nMat=new THREE.LineBasicMaterial({color:0xff4444});
  compassGroup.add(new THREE.Line(nGeom,nMat));
  // S arrow
  const sGeom=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,1.5)
  ]);
  const sMat=new THREE.LineBasicMaterial({color:0x44ff44});
  compassGroup.add(new THREE.Line(sGeom,sMat));
  // E arrow
  const eGeom=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(1.5,0,0)
  ]);
  const eMat=new THREE.LineBasicMaterial({color:0x4444ff});
  compassGroup.add(new THREE.Line(eGeom,eMat));
  // W arrow
  const wGeom=new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(-1.5,0,0)
  ]);
  const wMat=new THREE.LineBasicMaterial({color:0xffff00});
  compassGroup.add(new THREE.Line(wGeom,wMat));
  // Labels
  const addText=(txt,px,py,pz,col)=>{
    const d=document.createElement('div');
    d.textContent=txt;
    d.style.cssText=`color:${col};font-size:12px;font-weight:bold;font-family:monospace;background:none`;
    const o=new CSS2DObject(d);
    o.position.set(px,py,pz);
    compassGroup.add(o);
  };
  addText('N',0,0.3,-1.8,'#ff4444');
  addText('S',0,0.3,1.8,'#44ff44');
  addText('E',1.8,0.3,0,'#4444ff');
  addText('W',-1.8,0.3,0,'#ffff00');
  scene.add(compassGroup);
})();

// --- Camera presets ---
function setCamera(cam){
  activeCam=cam;
  controls.object=cam;
  cam.lookAt(0,0,0);
  controls.update();
}

document.getElementById('btnTop').onclick=()=>{
  setCamera(orthoCam);
  orthoCam.position.set(0,35,0);
  controls.target.set(0,0,0);
};
document.getElementById('btnIso').onclick=()=>{
  setCamera(isoCam);
  isoCam.position.set(18,14,18);
};
document.getElementById('btnWalk').onclick=()=>{
  setCamera(perspCam);
  perspCam.position.set(0,3,12);
  perspCam.lookAt(0,0,0);
};
document.getElementById('btnReset').onclick=()=>{
  setCamera(orthoCam);
  orthoCam.position.set(0,30,0);
  controls.target.set(0,0,0);
  controls.reset();
};

// Hover tooltips
const tooltip=document.getElementById('tooltip');
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let hoveredObject=null;

renderer.domElement.addEventListener('mousemove',ev=>{
  mouse.x=(ev.clientX/window.innerWidth)*2-1;
  mouse.y=-(ev.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse,activeCam);
  const intersects=raycaster.intersectObjects(scene.children.filter(o=>o.userData&&o.userData.tip),true);
  if(intersects.length){
    const obj=intersects[0].object;
    tooltip.style.display='block';
    tooltip.style.left=(ev.clientX+12)+'px';
    tooltip.style.top=(ev.clientY-30)+'px';
    tooltip.textContent=obj.userData.tip;
    hoveredObject=obj;
  } else {
    tooltip.style.display='none';
    hoveredObject=null;
  }
});

// Add tooltips to rooms
rooms.forEach((rm,i)=>{
  roomMeshes[i].solid.userData={tip:
    `<b>${rm.id}</b><br>${rm.w}m × ${rm.d}m × ${rm.h}m<br>Type: ${rm.type}`
  };
});

// Responsive
window.addEventListener('resize',()=>{
  const w=window.innerWidth, h=window.innerHeight;
  perspCam.aspect=w/h; perspCam.updateProjectionMatrix();
  const s=20;
  orthoCam.left=-s; orthoCam.right=s; orthoCam.top=s; orthoCam.bottom=-s;
  orthoCam.updateProjectionMatrix();
  renderer.setSize(w,h);
  labelRenderer.setSize(w,h);
});

// Animate
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,activeCam);
  labelRenderer.render(scene,activeCam);
}
animate();
</script>
</body>
